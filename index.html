<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXOBITCC | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { darkbg: '#0f172a', cardbg: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(16px); }
        .input-glow:focus-within { box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); border-color: #06b6d4; }
    </style>
</head>
<body class="bg-darkbg text-slate-300 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-panel border border-slate-700/50 rounded-3xl p-8 w-full max-w-md shadow-2xl relative z-10">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-wider mb-2">REXOBITCC</h1>
            <p class="text-slate-400 text-sm">Welcome back! Please login to your account.</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1 ml-1">Username</label>
                <div class="relative input-glow rounded-xl transition-all duration-300 border border-slate-700 bg-slate-800/50 overflow-hidden">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-400"></i>
                    </div>
                    <input type="text" id="username" placeholder="Enter your username" value="demo_user" class="w-full pl-11 pr-4 py-3 bg-transparent text-white placeholder-slate-500 focus:outline-none" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1 ml-1">Password</label>
                <div class="relative input-glow rounded-xl transition-all duration-300 border border-slate-700 bg-slate-800/50 overflow-hidden">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="password" placeholder="Enter your password" value="123456" class="w-full pl-11 pr-10 py-3 bg-transparent text-white placeholder-slate-500 focus:outline-none" required>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer hover:text-cyan-400 transition" onclick="togglePassword()">
                        <i class="fas fa-eye text-slate-400 hover:text-cyan-400" id="eye-icon"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm mt-2">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded bg-slate-800 border-slate-700 text-cyan-500">
                    <span class="ml-2 text-slate-400 hover:text-slate-300">Remember me</span>
                </label>
                <a href="#" class="text-cyan-400 hover:text-cyan-300 font-medium transition">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-lg py-3 rounded-xl mt-6 hover:shadow-lg hover:shadow-cyan-500/40 transform hover:-translate-y-0.5 transition-all duration-300">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400 border-t border-slate-700/50 pt-6">
            Don't have an account? 
            <a href="#" class="text-cyan-400 hover:text-cyan-300 font-semibold transition ml-1">Create Account</a>
        </div>

    </div>

    <script>
        // Redirect to dashboard on login
        function handleLogin(event) {
            event.preventDefault(); // Prevents page reload
            
            // Dummy loading effect
            const btn = event.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            // Redirect after 1 second to simulate processing
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }

        // Show/Hide Password functionality
        function togglePassword() {
            const pwdInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                pwdInput.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
