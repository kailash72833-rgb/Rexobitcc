<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXOBITCC | Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { darkbg: '#0f172a', cardbg: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(16px); }
        .page-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        tr:hover td { background-color: rgba(51, 65, 85, 0.5); }
        #loader { transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-darkbg text-slate-300 min-h-screen flex relative overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-50 bg-darkbg flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-shield-alt text-4xl text-purple-500 mb-4 animate-pulse"></i>
            <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Verifying Admin Access...</h2>
        </div>
    </div>

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <aside class="hidden md:flex flex-col w-64 glass-panel border-r border-slate-800 h-screen sticky top-0 z-20">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 tracking-wider">ADMIN PANEL</h1>
            <p id="admin-email" class="text-xs text-slate-400 mt-1 truncate">Loading...</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-2">
            <button onclick="switchAdminPage('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 bg-gradient-to-r from-purple-500/20 to-pink-500/10 text-purple-400 px-4 py-3 rounded-xl font-medium border border-purple-500/30 transition">
                <i class="fas fa-chart-pie w-5"></i> Overview
            </button>
            <button onclick="switchAdminPage('payments')" id="nav-payments" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-file-invoice-dollar w-5"></i> Payments <span id="badge-count" class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logoutAdmin()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-red-500/20 text-red-400 hover:text-red-500 px-4 py-3 rounded-xl transition">
                <i class="fas fa-power-off"></i> Exit Admin
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 w-full max-w-7xl mx-auto relative z-10" id="main-content" style="display:none;">
        
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h2 class="text-2xl font-bold text-white tracking-wide" id="page-title">Admin Overview</h2>
            <div class="flex items-center gap-4 ml-auto">
                <div class="flex items-center gap-3 bg-cardbg border border-slate-700 px-4 py-2 rounded-xl">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-600 flex items-center justify-center text-white font-bold"><i class="fas fa-user-shield"></i></div>
                    <span class="font-semibold text-white text-sm hidden md:block">Super Admin</span>
                </div>
            </div>
        </header>

        <div id="page-dashboard" class="page-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel border border-slate-700 rounded-2xl p-5 shadow-lg flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-amber-500/20 text-amber-400 flex items-center justify-center text-2xl"><i class="fas fa-clock"></i></div>
                    <div><p class="text-slate-400 text-sm">Pending Approvals</p><p id="dash-pending" class="text-2xl font-bold text-white">0</p></div>
                </div>
            </div>

            <div id="alert-box" class="bg-gradient-to-r from-amber-500/20 to-orange-500/10 border border-amber-500/30 rounded-2xl p-4 flex justify-between items-center mb-8 hidden">
                <div class="flex items-center gap-3">
                    <i class="fas fa-exclamation-circle text-amber-500 text-xl"></i>
                    <div>
                        <p class="text-white font-semibold">Action Required</p>
                        <p class="text-amber-200/80 text-sm">You have pending payment requests waiting for approval.</p>
                    </div>
                </div>
                <button onclick="switchAdminPage('payments')" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition">View Requests</button>
            </div>
        </div>

        <div id="page-payments" class="page-content">
            <div class="glass-panel border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
                <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                    <h3 class="text-lg font-bold text-white">Pending Deposits</h3>
                    <button onclick="loadPendingPayments()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm transition"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-slate-400 text-sm uppercase tracking-wider">
                                <th class="p-4 font-medium">User Email</th>
                                <th class="p-4 font-medium">Method</th>
                                <th class="p-4 font-medium">Amount</th>
                                <th class="p-4 font-medium">UTR / TxID</th>
                                <th class="p-4 font-medium text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="payment-table" class="text-sm divide-y divide-slate-700">
                            <tr><td colspan="5" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> Loading requests...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-0 w-full glass-panel border-t border-slate-800 flex justify-around p-3 pb-4 z-50">
        <button onclick="switchAdminPage('dashboard')" id="mob-dashboard" class="text-purple-400 flex flex-col items-center gap-1 transition scale-110"><i class="fas fa-chart-pie text-xl"></i><span class="text-[10px]">Overview</span></button>
        <button onclick="switchAdminPage('payments')" id="mob-payments" class="text-slate-400 hover:text-purple-400 flex flex-col items-center gap-1 transition relative"><i class="fas fa-file-invoice-dollar text-xl"></i><span class="text-[10px]">Payments</span></button>
        <button onclick="logoutAdmin()" class="text-red-400 flex flex-col items-center gap-1 transition"><i class="fas fa-power-off text-xl"></i><span class="text-[10px]">Exit</span></button>
    </div>

    <script>
        function switchAdminPage(page) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            const activeClass = "w-full flex items-center gap-3 bg-gradient-to-r from-purple-500/20 to-pink-500/10 text-purple-400 px-4 py-3 rounded-xl font-medium border border-purple-500/30 transition";
            const defaultClass = "w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition";
            
            document.getElementById('nav-dashboard').className = page === 'dashboard' ? activeClass : defaultClass;
            document.getElementById('nav-payments').className = page === 'payments' ? activeClass : defaultClass;

            const mobActive = "text-purple-400 flex flex-col items-center gap-1 transition scale-110";
            const mobDefault = "text-slate-400 hover:text-purple-400 flex flex-col items-center gap-1 transition";
            
            document.getElementById('mob-dashboard').className = page === 'dashboard' ? mobActive : mobDefault;
            document.getElementById('mob-payments').className = page === 'payments' ? mobActive : mobDefault;
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo72hO6ccULKpOzFMRvvzfsF7D-EnEpVs",
            authDomain: "rexobitcc-ef485.firebaseapp.com",
            projectId: "rexobitcc-ef485",
            storageBucket: "rexobitcc-ef485.firebasestorage.app",
            messagingSenderId: "972573000598",
            appId: "1:972573000598:web:a9ba9ee6da56a2949353b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security: Define your Admin Email here!
        const ADMIN_EMAIL = "admin@gmail.com"; 

        // 1. Check Admin Login
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // Success: Admin is logged in
                document.getElementById('admin-email').innerText = user.email;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadPendingPayments(); // Fetch data
            } else {
                // Kick out non-admins or not logged in users
                alert("Access Denied! You are not the Admin.");
                window.location.href = "index.html";
            }
        });

        // 2. Fetch Pending Payments from Database
        window.loadPendingPayments = async () => {
            const tableBody = document.getElementById('payment-table');
            tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> Loading requests...</td></tr>';
            
            try {
                const q = query(collection(db, "payments"), where("status", "==", "Pending"));
                const querySnapshot = await getDocs(q);
                
                let rows = '';
                let count = 0;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const docId = docSnap.id;
                    count++;
                    
                    rows += `
                    <tr id="row-${docId}" class="transition-colors border-t border-slate-700">
                        <td class="p-4 font-bold text-white">${data.email}</td>
                        <td class="p-4"><span class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-xs font-bold border border-blue-500/30">${data.method}</span></td>
                        <td class="p-4 font-bold text-emerald-400">₹${data.amount}</td>
                        <td class="p-4 font-mono text-slate-300">${data.utr_txid}</td>
                        <td class="p-4 flex justify-center gap-2">
                            <button onclick="processPayment('${docId}', '${data.userId}', ${data.amount}, 'Approved')" class="bg-emerald-500/20 hover:bg-emerald-500 text-emerald-400 hover:text-white border border-emerald-500/50 p-2 rounded-lg transition" title="Approve"><i class="fas fa-check"></i></button>
                            <button onclick="processPayment('${docId}', '${data.userId}', ${data.amount}, 'Rejected')" class="bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/50 p-2 rounded-lg transition" title="Reject"><i class="fas fa-times"></i></button>
                        </td>
                    </tr>`;
                });

                // Update UI Counters
                document.getElementById('badge-count').innerText = count;
                document.getElementById('dash-pending').innerText = count;
                
                if(count > 0) {
                    document.getElementById('alert-box').classList.remove('hidden');
                    tableBody.innerHTML = rows;
                } else {
                    document.getElementById('alert-box').classList.add('hidden');
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500"><i class="fas fa-check-circle text-4xl mb-3 text-emerald-500/50 block mx-auto"></i> No pending requests.</td></tr>';
                }

            } catch (error) {
                console.error("Error fetching payments: ", error);
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-red-400 p-4">Error loading data.</td></tr>';
            }
        };

        // 3. Process Payment Logic (Approve adds balance to User)
        window.processPayment = async (paymentId, userId, amount, action) => {
            const confirmAction = confirm(`Are you sure you want to mark this as ${action}?`);
            if(!confirmAction) return;

            try {
                // Update Payment Status in 'payments' collection
                await updateDoc(doc(db, "payments", paymentId), {
                    status: action
                });

                // If Approved, Add Amount to User's Balance in 'users' collection
                if (action === "Approved") {
                    await updateDoc(doc(db, "users", userId), {
                        balance: increment(amount) // Firebase magic: automatically adds to existing balance
                    });
                }

                alert(`Success! Payment has been ${action}.`);
                document.getElementById(`row-${paymentId}`).remove();
                loadPendingPayments(); // Reload table

            } catch (error) {
                console.error("Error updating document: ", error);
                alert("Failed to update status. Check console.");
            }
        };

        // 4. Logout Admin
        window.logoutAdmin = () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };
    </script>
</body>
</html>
