<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXOBITCC | Pro Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { darkbg: '#0f172a', cardbg: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(16px); }
        .page-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        tr:hover td { background-color: rgba(51, 65, 85, 0.5); }
        #loader { transition: opacity 0.5s; }
        .input-glow:focus-within { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-color: #a855f7; }
    </style>
</head>
<body class="bg-darkbg text-slate-300 min-h-screen flex relative overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-50 bg-darkbg flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-shield-alt text-4xl text-purple-500 mb-4 animate-pulse"></i>
            <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Verifying Admin Access...</h2>
        </div>
    </div>

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <aside class="hidden md:flex flex-col w-64 glass-panel border-r border-slate-800 h-screen sticky top-0 z-20">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 tracking-wider">ADMIN PANEL</h1>
            <p id="admin-email" class="text-xs text-slate-400 mt-1 truncate">Loading...</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-2">
            <button onclick="switchAdminPage('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 bg-gradient-to-r from-purple-500/20 to-pink-500/10 text-purple-400 px-4 py-3 rounded-xl font-medium border border-purple-500/30 transition">
                <i class="fas fa-chart-pie w-5"></i> Overview
            </button>
            <button onclick="switchAdminPage('payments')" id="nav-payments" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-file-invoice-dollar w-5"></i> Payments <span id="badge-count" class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </button>
            <button onclick="switchAdminPage('cards')" id="nav-cards" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-layer-group w-5"></i> Manage Cards
            </button>
            <button onclick="switchAdminPage('users')" id="nav-users" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-users w-5"></i> Users List
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logoutAdmin()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-red-500/20 text-red-400 hover:text-red-500 px-4 py-3 rounded-xl transition">
                <i class="fas fa-power-off"></i> Exit Admin
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 w-full max-w-7xl mx-auto relative z-10" id="main-content" style="display:none;">
        
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h2 class="text-2xl font-bold text-white tracking-wide" id="page-title">Admin Overview</h2>
            <div class="flex items-center gap-4 ml-auto">
                <div class="flex items-center gap-3 bg-cardbg border border-slate-700 px-4 py-2 rounded-xl">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-600 flex items-center justify-center text-white font-bold"><i class="fas fa-user-shield"></i></div>
                    <span class="font-semibold text-white text-sm hidden md:block">Super Admin</span>
                </div>
            </div>
        </header>

        <div id="page-dashboard" class="page-content active">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel border border-slate-700 rounded-2xl p-5 shadow-lg flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-amber-500/20 text-amber-400 flex items-center justify-center text-2xl"><i class="fas fa-clock"></i></div>
                    <div><p class="text-slate-400 text-sm">Pending Approvals</p><p id="dash-pending" class="text-2xl font-bold text-white">0</p></div>
                </div>
                <div class="glass-panel border border-slate-700 rounded-2xl p-5 shadow-lg flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-blue-500/20 text-blue-400 flex items-center justify-center text-2xl"><i class="fas fa-users"></i></div>
                    <div><p class="text-slate-400 text-sm">Total Users</p><p id="dash-users" class="text-2xl font-bold text-white">0</p></div>
                </div>
            </div>
        </div>

        <div id="page-payments" class="page-content">
            <div class="glass-panel border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
                <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                    <h3 class="text-lg font-bold text-white">Pending Deposits</h3>
                    <button onclick="loadPendingPayments()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm transition"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-slate-400 text-sm uppercase tracking-wider">
                                <th class="p-4 font-medium">User Email</th>
                                <th class="p-4 font-medium">Method</th>
                                <th class="p-4 font-medium">Amount</th>
                                <th class="p-4 font-medium">UTR / TxID</th>
                                <th class="p-4 font-medium text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="payment-table" class="text-sm divide-y divide-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-cards" class="page-content">
            <div class="glass-panel border border-slate-700 rounded-2xl p-6 mb-8 shadow-xl">
                <h3 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2"><i class="fas fa-plus-circle text-purple-400 mr-2"></i>Add New Card</h3>
                <form id="add-card-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Card Name</label>
                        <input type="text" id="card-name" placeholder="e.g. VIP Card" class="w-full px-4 py-2 rounded-xl border border-slate-700 bg-slate-800/50 text-white focus:outline-none input-glow" required>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Selling Price (₹)</label>
                        <input type="number" id="card-price" placeholder="e.g. 450" class="w-full px-4 py-2 rounded-xl border border-slate-700 bg-slate-800/50 text-white focus:outline-none input-glow" required>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Card Value/Balance (₹)</label>
                        <input type="number" id="card-value" placeholder="e.g. 5000" class="w-full px-4 py-2 rounded-xl border border-slate-700 bg-slate-800/50 text-white focus:outline-none input-glow" required>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold py-2.5 rounded-xl hover:shadow-lg hover:shadow-purple-500/40 transition">Add Card</button>
                </form>
            </div>

            <h3 class="text-lg font-bold text-white mb-4">Available Cards in Store</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="cards-grid">
                </div>
        </div>

        <div id="page-users" class="page-content">
            <div class="glass-panel border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
                <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                    <h3 class="text-lg font-bold text-white"><i class="fas fa-users text-purple-400 mr-2"></i>Registered Users</h3>
                    <button onclick="loadUsers()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm transition"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-slate-400 text-sm uppercase tracking-wider">
                                <th class="p-4 font-medium">User Email</th>
                                <th class="p-4 font-medium">Current Balance</th>
                                <th class="p-4 font-medium text-right">Manual Action</th>
                            </tr>
                        </thead>
                        <tbody id="users-table" class="text-sm divide-y divide-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-0 w-full glass-panel border-t border-slate-800 flex justify-around p-3 pb-4 z-50">
        <button onclick="switchAdminPage('dashboard')" id="mob-dashboard" class="text-purple-400 flex flex-col items-center gap-1 transition scale-110"><i class="fas fa-chart-pie text-xl"></i><span class="text-[10px]">Home</span></button>
        <button onclick="switchAdminPage('payments')" id="mob-payments" class="text-slate-400 flex flex-col items-center gap-1 transition"><i class="fas fa-file-invoice-dollar text-xl"></i><span class="text-[10px]">Payments</span></button>
        <button onclick="switchAdminPage('cards')" id="mob-cards" class="text-slate-400 flex flex-col items-center gap-1 transition"><i class="fas fa-layer-group text-xl"></i><span class="text-[10px]">Cards</span></button>
        <button onclick="switchAdminPage('users')" id="mob-users" class="text-slate-400 flex flex-col items-center gap-1 transition"><i class="fas fa-users text-xl"></i><span class="text-[10px]">Users</span></button>
    </div>

    <script>
        function switchAdminPage(page) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            const activeClass = "w-full flex items-center gap-3 bg-gradient-to-r from-purple-500/20 to-pink-500/10 text-purple-400 px-4 py-3 rounded-xl font-medium border border-purple-500/30 transition";
            const defaultClass = "w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition";
            
            ['dashboard', 'payments', 'cards', 'users'].forEach(p => {
                if(document.getElementById('nav-' + p)) document.getElementById('nav-' + p).className = defaultClass;
                if(document.getElementById('mob-' + p)) document.getElementById('mob-' + p).className = "text-slate-400 hover:text-purple-400 flex flex-col items-center gap-1 transition";
            });

            document.getElementById('nav-' + page).className = activeClass;
            document.getElementById('mob-' + page).className = "text-purple-400 flex flex-col items-center gap-1 transition scale-110";
            
            const titles = { 'dashboard': 'Admin Overview', 'payments': 'Payment Approvals', 'cards': 'Manage Cards', 'users': 'Manage Users' };
            document.getElementById('page-title').innerText = titles[page];
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, increment, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo72hO6ccULKpOzFMRvvzfsF7D-EnEpVs",
            authDomain: "rexobitcc-ef485.firebaseapp.com",
            projectId: "rexobitcc-ef485",
            storageBucket: "rexobitcc-ef485.firebasestorage.app",
            messagingSenderId: "972573000598",
            appId: "1:972573000598:web:a9ba9ee6da56a2949353b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security: Define your Admin Email here!
        const ADMIN_EMAIL = "admin@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-email').innerText = user.email;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadPendingPayments();
                loadCards();
                loadUsers();
            } else {
                alert("Access Denied! You are not the Admin.");
                window.location.href = "index.html";
            }
        });

        // ================= PAYMENTS LOGIC =================
        window.loadPendingPayments = async () => {
            const tableBody = document.getElementById('payment-table');
            tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> Loading requests...</td></tr>';
            
            try {
                const q = query(collection(db, "payments"), where("status", "==", "Pending"));
                const querySnapshot = await getDocs(q);
                let rows = ''; let count = 0;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    count++;
                    rows += `
                    <tr id="row-${docSnap.id}" class="transition-colors border-t border-slate-700">
                        <td class="p-4 font-bold text-white">${data.email}</td>
                        <td class="p-4"><span class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-xs font-bold border border-blue-500/30">${data.method}</span></td>
                        <td class="p-4 font-bold text-emerald-400">₹${data.amount}</td>
                        <td class="p-4 font-mono text-slate-300">${data.utr_txid}</td>
                        <td class="p-4 flex justify-center gap-2">
                            <button onclick="processPayment('${docSnap.id}', '${data.userId}', ${data.amount}, 'Approved')" class="bg-emerald-500/20 hover:bg-emerald-500 text-emerald-400 hover:text-white p-2 rounded-lg transition" title="Approve"><i class="fas fa-check"></i></button>
                            <button onclick="processPayment('${docSnap.id}', '${data.userId}', ${data.amount}, 'Rejected')" class="bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white p-2 rounded-lg transition" title="Reject"><i class="fas fa-times"></i></button>
                        </td>
                    </tr>`;
                });

                document.getElementById('badge-count').innerText = count;
                document.getElementById('dash-pending').innerText = count;
                tableBody.innerHTML = count > 0 ? rows : '<tr><td colspan="5" class="p-8 text-center text-slate-500"><i class="fas fa-check-circle text-4xl mb-3 text-emerald-500/50 block mx-auto"></i> No pending requests.</td></tr>';
            } catch (error) { console.error(error); }
        };

        window.processPayment = async (paymentId, userId, amount, action) => {
            if(!confirm(`Mark this payment as ${action}?`)) return;
            try {
                await updateDoc(doc(db, "payments", paymentId), { status: action });
                if (action === "Approved") await updateDoc(doc(db, "users", userId), { balance: increment(amount) });
                alert(`Success! Payment ${action}.`);
                loadPendingPayments();
                loadUsers(); // Refresh user list balance
            } catch (error) { alert("Failed to update."); }
        };

        // ================= CARDS LOGIC =================
        document.getElementById('add-card-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('card-name').value;
            const price = Number(document.getElementById('card-price').value);
            const value = Number(document.getElementById('card-value').value);

            try {
                await addDoc(collection(db, "cards"), { name, price, value, status: 'active' });
                alert("Card added successfully!");
                document.getElementById('add-card-form').reset();
                loadCards(); // Refresh cards
            } catch (error) { alert("Error adding card."); console.error(error); }
        });

        window.loadCards = async () => {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '<p class="text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>Loading cards...</p>';
            try {
                const querySnapshot = await getDocs(collection(db, "cards"));
                let html = '';
                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    html += `
                    <div class="glass-panel border border-slate-700 rounded-2xl p-5 shadow-lg relative group">
                        <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="deleteCard('${docSnap.id}')" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-red-500 text-white flex items-center justify-center transition shadow"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xl mb-4"><i class="fas fa-gem"></i></div>
                        <h4 class="text-lg font-bold text-white mb-1">${c.name}</h4>
                        <p class="text-sm text-slate-400 mb-4">Card Value: ₹${c.value}</p>
                        <div class="border-t border-slate-700 pt-3 flex justify-between items-center">
                            <span class="text-white font-bold text-lg">₹${c.price}</span>
                            <span class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded border border-emerald-500/30">Active</span>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html || '<p class="text-slate-400">No cards added yet.</p>';
            } catch (error) { console.error(error); }
        };

        window.deleteCard = async (cardId) => {
            if(!confirm("Delete this card permanently?")) return;
            try {
                await deleteDoc(doc(db, "cards", cardId));
                loadCards();
            } catch (error) { alert("Error deleting card."); }
        };

        // ================= USERS LOGIC =================
        window.loadUsers = async () => {
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-slate-400">Loading...</td></tr>';
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = ''; let count = 0;
                querySnapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    count++;
                    html += `
                    <tr class="border-t border-slate-700">
                        <td class="p-4 font-medium text-white">${u.email}</td>
                        <td class="p-4 font-bold text-cyan-400">₹${u.balance || 0}</td>
                        <td class="p-4 text-right">
                            <button onclick="addManualBalance('${docSnap.id}', '${u.email}')" class="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition shadow-lg">
                                <i class="fas fa-plus mr-1"></i> Add Funds
                            </button>
                        </td>
                    </tr>`;
                });
                document.getElementById('dash-users').innerText = count;
                tbody.innerHTML = html;
            } catch (error) { console.error(error); }
        };

        window.addManualBalance = async (userId, userEmail) => {
            const amountStr = prompt(`Enter amount to ADD to ${userEmail}'s balance:`);
            if(!amountStr) return;
            const amount = Number(amountStr);
            if(isNaN(amount) || amount <= 0) { alert("Invalid amount!"); return; }

            try {
                await updateDoc(doc(db, "users", userId), { balance: increment(amount) });
                alert(`Successfully added ₹${amount} to ${userEmail}.`);
                loadUsers(); // Refresh table
            } catch (error) { alert("Failed to add balance."); console.error(error); }
        };

        // ================= LOGOUT =================
        window.logoutAdmin = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
