<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXOBITCC | Premium Card Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace']
                    },
                    colors: { darkbg: '#080c16', cardbg: '#0b1120' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .glass-effect { background: rgba(11, 17, 32, 0.85); backdrop-filter: blur(16px); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { transition: opacity 0.5s; }
        
        /* New Table Specific Styles */
        .neon-border-right {
            position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
            background: #00d2ff; box-shadow: 0 0 15px #00d2ff, 0 0 5px #00d2ff; z-index: 10;
        }
        .reveal-data { filter: blur(4px); transition: filter 0.3s ease; user-select: none; }
        .reveal-data.unmasked { filter: blur(0); user-select: text; }
    </style>
</head>
<body class="bg-darkbg text-slate-300 min-h-screen flex relative overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-50 bg-darkbg flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-[#00d2ff] mb-4"></i>
            <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-widest uppercase">Initializing REXOBITCC...</h2>
        </div>
    </div>

    <aside class="hidden md:flex flex-col w-64 glass-effect border-r border-slate-800/50 h-screen sticky top-0 z-20">
        <div class="p-6 text-center border-b border-slate-800/50">
            <h1 class="text-3xl font-bold text-white tracking-widest font-mono">REXOBIT<span class="text-[#00d2ff]">CC</span></h1>
            <p id="sidebar-email" class="text-xs text-slate-500 mt-2 truncate font-mono">Loading...</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('store')" id="nav-store" class="w-full flex items-center gap-3 bg-[#00d2ff]/10 text-[#00d2ff] px-4 py-3 rounded-lg font-medium border border-[#00d2ff]/20 transition">
                <i class="fas fa-shopping-cart w-5"></i> Card Store
            </button>
            <button onclick="switchTab('history')" id="nav-history" class="w-full flex items-center gap-3 hover:bg-slate-800/50 px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white transition">
                <i class="fas fa-layer-group w-5"></i> My Cards
            </button>
            <a href="payment.html" class="flex items-center gap-3 hover:bg-slate-800/50 px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white transition">
                <i class="fas fa-wallet w-5"></i> Add Funds
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800/50">
            <button onclick="logoutUser()" class="w-full flex items-center justify-center gap-2 bg-slate-800/50 hover:bg-red-500/10 text-slate-400 hover:text-red-500 px-4 py-3 rounded-lg transition">
                <i class="fas fa-power-off"></i> Disconnect
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 w-full max-w-7xl mx-auto relative z-10">
        
        <header class="flex justify-between items-center mb-8">
            <div class="md:hidden text-2xl font-bold text-white font-mono tracking-widest">REXOBIT<span class="text-[#00d2ff]">CC</span></div>
            <div class="flex items-center gap-4 ml-auto">
                <div class="bg-[#111827] border border-slate-700/50 px-5 py-2.5 rounded-lg flex items-center gap-3 shadow-lg">
                    <span class="text-slate-400 text-xs font-bold tracking-widest uppercase">Balance</span>
                    <span id="user-balance" class="font-bold text-[#00d2ff] font-mono text-lg">₹0</span>
                </div>
            </div>
        </header>

        <div id="tab-store" class="tab-content active">
            
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-wide">Live Card Data</h2>
                    <p class="text-slate-500 text-sm mt-1">Fresh bases available for purchase.</p>
                </div>
            </div>

            <div class="relative bg-cardbg border border-slate-800/70 rounded-xl shadow-2xl overflow-hidden">
                <div class="neon-border-right"></div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-[#131c31] text-slate-400 text-[10px] font-bold tracking-[0.15em] uppercase border-b border-slate-800/50">
                            <tr>
                                <th class="px-5 py-4">BIN</th>
                                <th class="px-5 py-4">PROVIDER</th>
                                <th class="px-5 py-4">TYPE</th>
                                <th class="px-5 py-4">EXPIRY</th>
                                <th class="px-5 py-4">NAME</th>
                                <th class="px-5 py-4">COUNTRY</th>
                                <th class="px-5 py-4">BALANCE</th>
                                <th class="px-5 py-4 text-right pr-8">EXTRAS</th>
                            </tr>
                        </thead>
                        <tbody id="store-table-body" class="divide-y divide-slate-800/30">
                            <tr><td colspan="8" class="text-center py-10 text-slate-500"><i class="fas fa-spinner fa-spin text-xl mb-2"></i><br>Fetching database...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <h2 class="text-2xl font-bold text-white mb-6 tracking-wide">My Purchased Cards</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="history-grid">
                </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-0 w-full bg-[#0b1120] border-t border-slate-800/50 flex justify-around p-3 pb-4 z-50">
        <button onclick="switchTab('store')" id="mob-store" class="text-[#00d2ff] flex flex-col items-center gap-1 transition scale-110"><i class="fas fa-shopping-cart text-xl"></i><span class="text-[10px]">Store</span></button>
        <button onclick="switchTab('history')" id="mob-history" class="text-slate-500 hover:text-[#00d2ff] flex flex-col items-center gap-1 transition"><i class="fas fa-layer-group text-xl"></i><span class="text-[10px]">History</span></button>
        <a href="payment.html" class="text-slate-500 hover:text-[#00d2ff] flex flex-col items-center gap-1 transition"><i class="fas fa-wallet text-xl"></i><span class="text-[10px]">Deposit</span></a>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const activeDesk = "w-full flex items-center gap-3 bg-[#00d2ff]/10 text-[#00d2ff] px-4 py-3 rounded-lg font-medium border border-[#00d2ff]/20 transition";
            const defaultDesk = "w-full flex items-center gap-3 hover:bg-slate-800/50 px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white transition";
            
            document.getElementById('nav-store').className = tab === 'store' ? activeDesk : defaultDesk;
            document.getElementById('nav-history').className = tab === 'history' ? activeDesk : defaultDesk;

            const activeMob = "text-[#00d2ff] flex flex-col items-center gap-1 transition scale-110";
            const defaultMob = "text-slate-500 hover:text-[#00d2ff] flex flex-col items-center gap-1 transition";
            
            document.getElementById('mob-store').className = tab === 'store' ? activeMob : defaultMob;
            document.getElementById('mob-history').className = tab === 'history' ? activeMob : defaultMob;

            if(tab === 'history') window.loadMyCards();
            if(tab === 'store') window.loadStoreCards();
        }

        function revealData(cardId) {
            const btn = document.getElementById(`btn-reveal-${cardId}`);
            const dataEls = document.querySelectorAll(`.data-${cardId}`);
            if (btn.innerText.includes("Reveal")) {
                dataEls.forEach(el => el.classList.add('unmasked'));
                btn.innerHTML = '<i class="fas fa-eye-slash mr-1"></i> Hide';
                btn.classList.replace('text-[#00d2ff]', 'text-slate-500');
            } else {
                dataEls.forEach(el => el.classList.remove('unmasked'));
                btn.innerHTML = '<i class="fas fa-eye mr-1"></i> Reveal';
                btn.classList.replace('text-slate-500', 'text-[#00d2ff]');
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, increment, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo72hO6ccULKpOzFMRvvzfsF7D-EnEpVs",
            authDomain: "rexobitcc-ef485.firebaseapp.com",
            projectId: "rexobitcc-ef485",
            storageBucket: "rexobitcc-ef485.firebasestorage.app",
            messagingSenderId: "972573000598",
            appId: "1:972573000598:web:a9ba9ee6da56a2949353b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let currentBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('sidebar-email').innerText = user.email;
                
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        currentBalance = docSnap.data().balance || 0;
                        document.getElementById('user-balance').innerText = '₹' + currentBalance;
                    }
                });

                document.getElementById('loader').style.display = 'none';
                window.loadStoreCards(); 
            } else {
                window.location.href = "index.html";
            }
        });

        // LOAD STORE CARDS (TABLE FORMAT)
        window.loadStoreCards = async () => {
            const tableBody = document.getElementById('store-table-body');
            try {
                const q = query(collection(db, "cards"), where("buyerId", "==", null));
                const querySnapshot = await getDocs(q);
                let html = '';
                
                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    // BIN Extraction (First 6 digits)
                    const bin = c.cardNumber ? c.cardNumber.substring(0, 6) : '******';
                    
                    html += `
                    <tr class="hover:bg-slate-800/40 transition text-sm">
                        <td class="px-5 py-4 font-mono text-[#00d2ff] font-bold">${bin}</td>
                        <td class="px-5 py-4 text-slate-300">${c.brand || 'VISA'}</td>
                        <td class="px-5 py-4 text-slate-500 font-bold text-xs uppercase">CREDIT</td>
                        <td class="px-5 py-4 font-mono text-slate-300">${c.expiry || '12/28'}</td>
                        <td class="px-5 py-4 text-slate-300">${c.name}</td>
                        <td class="px-5 py-4 text-slate-500 font-bold text-xs">GLOBAL</td>
                        <td class="px-5 py-4 text-emerald-400 font-bold font-mono">₹${c.value}</td>
                        <td class="px-5 py-4 text-right pr-8">
                            <button onclick="buyCard('${docSnap.id}', ${c.price})" class="bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white px-4 py-1.5 rounded text-xs font-bold tracking-widest uppercase transition shadow-[0_0_10px_rgba(0,210,255,0.2)] hover:shadow-[0_0_15px_rgba(0,210,255,0.5)]">
                                BUY ₹${c.price}
                            </button>
                        </td>
                    </tr>`;
                });
                tableBody.innerHTML = html || '<tr><td colspan="8" class="text-center py-10 text-slate-500">No data available in the database.</td></tr>';
            } catch (error) { console.error(error); }
        };

        window.buyCard = async (cardId, price) => {
            if(!confirm(`Proceed to buy this item for ₹${price}?`)) return;

            if(currentBalance < price) {
                alert("Insufficient Balance! Please Add Funds.");
                window.location.href = "payment.html";
                return;
            }

            try {
                await updateDoc(doc(db, "users", currentUser.uid), { balance: increment(-price) });
                await updateDoc(doc(db, "cards", cardId), { status: 'sold', buyerId: currentUser.uid, purchasedAt: serverTimestamp() });
                
                alert("Purchase Successful! Data moved to History.");
                window.loadStoreCards(); 
            } catch (error) { alert("Transaction failed."); }
        };

        // LOAD HISTORY CARDS
        window.loadMyCards = async () => {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10"><i class="fas fa-spinner fa-spin text-2xl"></i></div>';
            
            try {
                const q = query(collection(db, "cards"), where("buyerId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                let html = '';

                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    html += `
                    <div class="bg-[#0b1120] border border-[#00d2ff]/30 rounded-xl p-5 relative overflow-hidden group">
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#00d2ff]/10 rounded-full blur-2xl"></div>
                        
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div>
                                <h4 class="text-lg font-bold text-white tracking-widest">${c.name}</h4>
                                <p class="text-xs text-[#00d2ff] font-mono mt-1">${c.brand}</p>
                            </div>
                            <span class="text-[10px] uppercase tracking-widest bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20">Purchased</span>
                        </div>
                        
                        <div class="bg-[#060910] border border-slate-800 rounded-lg p-4 mb-4 relative">
                            <button id="btn-reveal-${docSnap.id}" onclick="revealData('${docSnap.id}')" class="absolute top-2 right-2 z-10 text-[10px] font-bold tracking-widest text-[#00d2ff] bg-slate-800/50 px-2 py-1 rounded uppercase hover:bg-slate-700 transition">
                                <i class="fas fa-eye mr-1"></i> Reveal
                            </button>

                            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Card Number</p>
                            <p class="font-mono text-white text-lg tracking-widest mb-3 reveal-data data-${docSnap.id}">${c.cardNumber || 'N/A'}</p>
                            
                            <div class="flex gap-8">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Expiry</p>
                                    <p class="font-mono text-white reveal-data data-${docSnap.id}">${c.expiry || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">CVV</p>
                                    <p class="font-mono text-white reveal-data data-${docSnap.id}">${c.cvv || 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                        <div class="text-xs text-slate-500 flex justify-between">
                            <span>Balance/Value: <span class="text-emerald-400 font-bold font-mono">₹${c.value}</span></span>
                        </div>
                    </div>`;
                });

                grid.innerHTML = html || '<div class="col-span-full text-center text-slate-500 py-10 font-mono text-sm tracking-widest">NO PURCHASE HISTORY FOUND</div>';
            } catch (error) { console.error(error); }
        };

        window.logoutUser = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
