<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXOBITCC | Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { darkbg: '#0f172a', cardbg: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-effect { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { transition: opacity 0.5s; }
        .reveal-data { filter: blur(4px); transition: filter 0.3s ease; user-select: none; }
        .reveal-data.unmasked { filter: blur(0); user-select: text; }
    </style>
</head>
<body class="bg-darkbg text-slate-300 min-h-screen flex relative overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-50 bg-darkbg flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-cyan-500 mb-4"></i>
            <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Loading Environment...</h2>
        </div>
    </div>

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <aside class="hidden md:flex flex-col w-64 glass-effect border-r border-slate-800 h-screen sticky top-0 z-20">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-wider">REXOBITCC</h1>
            <p id="sidebar-email" class="text-xs text-slate-400 mt-1 truncate">Loading...</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('store')" id="nav-store" class="w-full flex items-center gap-3 bg-gradient-to-r from-cyan-500/20 to-blue-500/10 text-cyan-400 px-4 py-3 rounded-xl font-medium border border-cyan-500/30 transition">
                <i class="fas fa-store w-5"></i> Card Store
            </button>
            <button onclick="switchTab('history')" id="nav-history" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-history w-5"></i> My Cards
            </button>
            <a href="payment.html" class="flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition">
                <i class="fas fa-wallet w-5"></i> Add Funds
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logoutUser()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-red-500/20 text-red-400 hover:text-red-500 px-4 py-3 rounded-xl transition">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 w-full max-w-7xl mx-auto relative z-10">
        
        <header class="flex justify-between items-center mb-8">
            <div class="md:hidden text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">REXOBITCC</div>
            <div class="flex items-center gap-4 ml-auto">
                <div class="bg-cardbg border border-slate-700 px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
                    <i class="fas fa-wallet text-cyan-400"></i>
                    <span id="user-balance" class="font-bold text-emerald-400">₹0</span>
                </div>
            </div>
        </header>

        <div id="tab-store" class="tab-content active">
            <div class="bg-gradient-to-r from-cyan-600 to-blue-700 rounded-2xl p-6 md:p-8 mb-8 shadow-lg flex justify-between items-center">
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold text-white">Premium Card Store</h2>
                    <p class="text-cyan-100 mt-1 text-sm">Purchase high-value virtual cards instantly.</p>
                </div>
                <a href="payment.html" class="hidden md:inline-block bg-white text-blue-700 font-bold px-6 py-3 rounded-xl hover:shadow-lg transition">+ Add Funds</a>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="store-grid">
                <div class="col-span-full text-center text-slate-500 py-10"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Loading store items...</div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-2"><i class="fas fa-history text-cyan-400 mr-2"></i>My Purchased Cards</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="history-grid">
                <div class="col-span-full text-center text-slate-500 py-10">You haven't purchased any cards yet.</div>
            </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-0 w-full glass-effect border-t border-slate-800 flex justify-around p-3 pb-4 z-50">
        <button onclick="switchTab('store')" id="mob-store" class="text-cyan-400 flex flex-col items-center gap-1 transition scale-110"><i class="fas fa-store text-xl"></i><span class="text-[10px]">Store</span></button>
        <button onclick="switchTab('history')" id="mob-history" class="text-slate-400 hover:text-cyan-400 flex flex-col items-center gap-1 transition"><i class="fas fa-history text-xl"></i><span class="text-[10px]">My Cards</span></button>
        <a href="payment.html" class="text-slate-400 hover:text-cyan-400 flex flex-col items-center gap-1 transition"><i class="fas fa-wallet text-xl"></i><span class="text-[10px]">Add Fund</span></a>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const activeClassDesk = "w-full flex items-center gap-3 bg-gradient-to-r from-cyan-500/20 to-blue-500/10 text-cyan-400 px-4 py-3 rounded-xl font-medium border border-cyan-500/30 transition";
            const defaultClassDesk = "w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl font-medium text-slate-300 transition";
            
            document.getElementById('nav-store').className = tab === 'store' ? activeClassDesk : defaultClassDesk;
            document.getElementById('nav-history').className = tab === 'history' ? activeClassDesk : defaultClassDesk;

            const activeClassMob = "text-cyan-400 flex flex-col items-center gap-1 transition scale-110";
            const defaultClassMob = "text-slate-400 hover:text-cyan-400 flex flex-col items-center gap-1 transition";
            
            document.getElementById('mob-store').className = tab === 'store' ? activeClassMob : defaultClassMob;
            document.getElementById('mob-history').className = tab === 'history' ? activeClassMob : defaultClassMob;

            if(tab === 'history') window.loadMyCards();
            if(tab === 'store') window.loadStoreCards();
        }

        // Share Card Function
        function shareCard(name, price, value, brand) {
            const shareText = `Check out this amazing card on REXOBITCC!\n\nCard: ${name}\nBrand: ${brand}\nCard Value: ₹${value}\nSelling Price: ₹${price}\n\nLogin now to buy!`;
            if (navigator.share) {
                navigator.share({ title: 'REXOBITCC Card', text: shareText }).catch(console.error);
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Card details copied to clipboard to share!");
            }
        }

        // Toggle Mask Data
        function revealData(cardId) {
            const btn = document.getElementById(`btn-reveal-${cardId}`);
            const dataEls = document.querySelectorAll(`.data-${cardId}`);
            
            if (btn.innerText.includes("Tap to Reveal")) {
                dataEls.forEach(el => el.classList.add('unmasked'));
                btn.innerHTML = '<i class="fas fa-eye-slash mr-1"></i> Hide Details';
                btn.classList.replace('text-cyan-400', 'text-slate-400');
            } else {
                dataEls.forEach(el => el.classList.remove('unmasked'));
                btn.innerHTML = '<i class="fas fa-eye mr-1"></i> Tap to Reveal';
                btn.classList.replace('text-slate-400', 'text-cyan-400');
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, increment, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo72hO6ccULKpOzFMRvvzfsF7D-EnEpVs",
            authDomain: "rexobitcc-ef485.firebaseapp.com",
            projectId: "rexobitcc-ef485",
            storageBucket: "rexobitcc-ef485.firebasestorage.app",
            messagingSenderId: "972573000598",
            appId: "1:972573000598:web:a9ba9ee6da56a2949353b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let currentBalance = 0;

        // 1. Check Login & Listen to Balance Live
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('sidebar-email').innerText = user.email;
                
                // Real-time balance listener
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        currentBalance = docSnap.data().balance || 0;
                        document.getElementById('user-balance').innerText = '₹' + currentBalance;
                    }
                });

                document.getElementById('loader').style.display = 'none';
                window.loadStoreCards(); // Load store on start
            } else {
                window.location.href = "index.html";
            }
        });

        // 2. Load Active Store Cards
        window.loadStoreCards = async () => {
            const grid = document.getElementById('store-grid');
            try {
                // Fetch cards where buyer is null (Not sold yet)
                const q = query(collection(db, "cards"), where("buyerId", "==", null));
                const querySnapshot = await getDocs(q);
                let html = '';
                
                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    html += `
                    <div class="bg-cardbg border border-slate-700 rounded-2xl p-5 shadow-lg relative group hover:border-cyan-500/50 transition">
                        <button onclick="shareCard('${c.name}', ${c.price}, ${c.value}, '${c.brand}')" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-slate-800 hover:bg-cyan-600 text-slate-300 hover:text-white flex justify-center items-center transition shadow z-10" title="Share this card">
                            <i class="fas fa-share-alt text-xs"></i>
                        </button>

                        <div class="h-24 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 flex items-center justify-center relative overflow-hidden">
                            <i class="fas fa-gem text-5xl text-white/30"></i>
                            <div class="absolute bottom-2 left-2 text-white/80 text-xs font-mono">**** ${c.cardNumber.slice(-4)}</div>
                        </div>
                        <h4 class="text-lg font-bold text-white mb-1">${c.name}</h4>
                        <p class="text-xs text-slate-400 mb-3"><i class="fas fa-info-circle text-cyan-400 mr-1"></i>${c.brand}</p>
                        
                        <div class="flex justify-between items-center text-sm mb-4">
                            <span class="text-slate-400">Card Value:</span>
                            <span class="text-emerald-400 font-semibold">₹${c.value}</span>
                        </div>
                        
                        <div class="flex justify-between items-center border-t border-slate-700 pt-4">
                            <div>
                                <p class="text-xs text-slate-400">Pay Amount</p>
                                <p class="text-xl font-bold text-white">₹${c.price}</p>
                            </div>
                            <button onclick="buyCard('${docSnap.id}', ${c.price})" class="bg-gradient-to-r from-cyan-500 to-blue-600 text-white px-5 py-2 rounded-xl font-semibold hover:shadow-lg hover:shadow-cyan-500/40 transition active:scale-95">
                                Buy Now
                            </button>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html || '<div class="col-span-full text-center text-slate-400 py-10"><i class="fas fa-box-open text-3xl mb-3 text-slate-600"></i><br>Store is empty right now. Check back later!</div>';
            } catch (error) { console.error(error); }
        };

        // 3. Purchase Logic
        window.buyCard = async (cardId, price) => {
            if(!confirm(`Buy this card for ₹${price}?`)) return;

            if(currentBalance < price) {
                alert("Insufficient Balance! Please Add Funds.");
                window.location.href = "payment.html";
                return;
            }

            try {
                // 1. Deduct balance from user
                await updateDoc(doc(db, "users", currentUser.uid), {
                    balance: increment(-price)
                });

                // 2. Mark card as sold & assign to user
                await updateDoc(doc(db, "cards", cardId), {
                    status: 'sold',
                    buyerId: currentUser.uid,
                    purchasedAt: serverTimestamp()
                });

                alert("Purchase Successful! Card added to your History.");
                window.loadStoreCards(); // Refresh store

            } catch (error) {
                console.error("Purchase error: ", error);
                alert("Transaction failed.");
            }
        };

        // 4. Load User's Purchased Cards (History)
        window.loadMyCards = async () => {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i></div>';
            
            try {
                const q = query(collection(db, "cards"), where("buyerId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                let html = '';

                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    html += `
                    <div class="glass-effect border border-emerald-500/30 rounded-2xl p-5 shadow-[0_0_15px_rgba(16,185,129,0.1)] relative">
                        <div class="absolute top-0 right-0 bg-emerald-500/20 text-emerald-400 text-xs px-3 py-1 rounded-bl-xl rounded-tr-xl border-b border-l border-emerald-500/30"><i class="fas fa-check-circle mr-1"></i>Purchased</div>
                        
                        <h4 class="text-xl font-bold text-white mb-1 mt-2">${c.name}</h4>
                        <p class="text-sm text-slate-400 mb-4"><i class="fas fa-info-circle text-cyan-400 mr-1"></i>${c.brand}</p>
                        
                        <div class="bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 relative overflow-hidden group">
                            <button id="btn-reveal-${docSnap.id}" onclick="revealData('${docSnap.id}')" class="absolute top-2 right-2 z-10 text-xs font-semibold text-cyan-400 bg-slate-800 px-2 py-1 rounded-md hover:bg-slate-700 transition cursor-pointer">
                                <i class="fas fa-eye mr-1"></i> Tap to Reveal
                            </button>

                            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Card Number</p>
                            <p class="font-mono text-emerald-400 text-lg tracking-widest mb-3 reveal-data data-${docSnap.id}">${c.cardNumber}</p>
                            
                            <div class="flex gap-8">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Expiry</p>
                                    <p class="font-mono text-white reveal-data data-${docSnap.id}">${c.expiry}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">CVV</p>
                                    <p class="font-mono text-white reveal-data data-${docSnap.id}">${c.cvv}</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center text-sm border-t border-slate-700 pt-3">
                            <span class="text-slate-400">Card Value</span>
                            <span class="text-white font-bold">₹${c.value}</span>
                        </div>
                    </div>`;
                });

                grid.innerHTML = html || '<div class="col-span-full text-center text-slate-400 py-10"><i class="fas fa-folder-open text-3xl mb-3 text-slate-600"></i><br>You have not purchased any cards yet.</div>';
            } catch (error) { console.error(error); }
        };

        // Logout
        window.logoutUser = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
